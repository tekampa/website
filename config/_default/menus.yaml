# Navigation Links
#   To link a homepage section, set the URL to a hash `#` followed by the `id` of
#     the desired block in `content/_index.md`.
#   The weight parameter defines the order that the links will appear in.

main:
  - name: Home
    url: /#about
    weight: 10
  - name: Working Papers
    url: /#workingpapers
    weight: 20
  - name: Works in Progress
    url: /#worksinprogress
    weight: 30
  - name: Teaching
    url: /#teaching
    weight: 40
  - name: Blog
    url: /#posts
    weight: 50
  - name: Contact
    url: /#contact
    weight: 60
